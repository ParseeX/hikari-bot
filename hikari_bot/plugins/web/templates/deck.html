<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">  <!-- 新增 -->
  <title>游戏王卡表生成器</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 2rem 1rem; background-color: #f8f9fa; }
    .container {
      max-width: 700px;  /* 放宽宽度 */
      margin: auto;
    }
    .qr img {
      width: 45%;
      max-width: 300px;
      height: auto;
      margin: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container bg-white p-4 rounded shadow">
    <h2 class="text-center mb-4">游戏王卡表生成器</h2>

    <form id="deck-form" method="post" action="/web/deck/generate" enctype="multipart/form-data">
      <div class="mb-3">
        <label class="form-label">选择卡组上传方式：</label><br>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="input_type" id="link_input" value="link" checked>
          <label class="form-check-label" for="link_input">通过卡组链接</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="input_type" id="ydk_input" value="ydk">
          <label class="form-check-label" for="ydk_input">通过YDK文件</label>
        </div>
      </div>

      <div class="mb-3" id="link_field">
        <label for="deck_link" class="form-label">卡组链接：</label>
        <input type="text" class="form-control" id="deck_link" name="deck_link" placeholder="粘贴YGOMobile卡组分享链接">
      </div>

      <div class="mb-3 d-none" id="ydk_field">
        <label for="ydk_file" class="form-label">上传YDK文件：</label>
        <input class="form-control" type="file" id="ydk_file" name="ydk_file" accept=".ydk">
      </div>

      <div class="mb-3">
        <label for="language" class="form-label">导出语言：</label>
        <select class="form-select" id="language" name="language">
          <option value="sc">中文</option>
          <option value="jp">日文</option>
          <option value="en">英文</option>
        </select>
      </div>

      <button type="submit" class="btn btn-primary w-100">生成卡表</button>
    </form>

    <hr>
    <div id="result"></div>
    <hr>


    <div class="text-center mt-4">
      <h5>关注水橋パルスィOfficial谢谢喵</h5>
      <div class="qr d-flex justify-content-center align-items-end" style="gap: 1rem;">
        <img src="/static/bilibili.jpg" alt="B站关注">
        <img src="/static/qq.jpg" alt="粉丝群">
      </div>
    </div>

    <!-- <div class="text-center mt-4">
      <h5>请我打一把舞萌？</h5>
      <div class="qr d-flex justify-content-center align-items-end" style="gap: 1rem;">
        <img src="/static/alipay.jpg" alt="支付宝" style="max-width: 250px; height: auto;">
        <img src="/static/wechat.jpg" alt="微信" style="max-width: 250px; height: auto;">
      </div>
    </div> -->
  </div>

  <script>
    let currentBlobUrl = null;

    const linkRadio = document.getElementById("link_input");
    const ydkRadio = document.getElementById("ydk_input");
    const linkField = document.getElementById("link_field");
    const ydkField = document.getElementById("ydk_field");

    function toggleInput() {
      if (linkRadio.checked) {
        linkField.classList.remove("d-none");
        ydkField.classList.add("d-none");
      } else {
        linkField.classList.add("d-none");
        ydkField.classList.remove("d-none");
      }
    }

    linkRadio.addEventListener("change", toggleInput);
    ydkRadio.addEventListener("change", toggleInput);

    document.getElementById("deck-form").addEventListener("submit", async function(e) {
        e.preventDefault(); // 阻止默认提交刷新页面

        const form = e.target;
        const formData = new FormData(form);

        const resultDiv = document.getElementById("result");
        resultDiv.innerHTML = "正在生成...";

        const response = await fetch("/deck/generate", {
            method: "POST",
            body: formData
        })
        .then(async (response) => {
          const contentType = response.headers.get("content-type");

          if (response.ok && contentType && contentType.includes("application/pdf")) {
            const disposition = response.headers.get('Content-Disposition');
            let filename = 'deck_list.pdf';

            if (disposition && disposition.indexOf('filename=') !== -1) {
              const filenameRegex = /filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/;
              const matches = filenameRegex.exec(disposition);
              if (matches != null && matches[1]) {
                filename = matches[1].replace(/['"]/g, '');
              }
            }

            if (currentBlobUrl) {
              window.URL.revokeObjectURL(currentBlobUrl);
            }

            const blob = await response.blob();
            currentBlobUrl = window.URL.createObjectURL(blob);
            resultDiv.innerHTML = `<div class="alert alert-success mt-3">生成成功！<a href="${currentBlobUrl}" download="${filename}" target="_blank">点击下载 PDF</a></div>`;

          } else {
            // 是 JSON，说明是失败信息
            const data = await response.json();
            resultDiv.innerHTML = `<div class="alert alert-danger mt-3">生成失败！${data.message}</div>`;
          }
        })
        const data = await response.json();
        console.log(data);

        if (data.success) {
            // 生成成功，显示PDF链接
            resultDiv.innerHTML = `<a href="${data.message}" target="_blank">点击下载生成的PDF</a>`;
        } else {
            resultDiv.innerHTML = `<div class="alert alert-danger mt-3">生成失败！${data.message}</div>`;
        }
    });
</script>
</body>
</html>
